kind = "web"
previewPath = "/"
title = "Noted"
version = "1.0.0"
id = "artifacts/noted"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22557

[services.development]
run = "pnpm --filter @workspace/noted run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/noted", "run", "build" ]
publicDir = "artifacts/noted/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22557"
BASE_PATH = "/"
