name: Build Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-android:
    runs-on: ubuntu-latest

    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      APP_URL: ${{ secrets.APP_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install Capacitor dependencies
        working-directory: android-wrapper
        run: npm install

      - name: Ensure web assets directory exists
        working-directory: android-wrapper
        run: mkdir -p public

      - name: Add Android platform
        working-directory: android-wrapper
        run: npx cap add android

      - name: Sync Capacitor
        working-directory: android-wrapper
        run: npx cap sync android

      - name: Make Gradle wrapper executable
        working-directory: android-wrapper/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: android-wrapper/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: noted-android-apk
          path: android-wrapper/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Noted ${{ github.ref_name }}
          files: android-wrapper/android/app/build/outputs/apk/debug/app-debug.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
